apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: "hpa-cdcai-microsvc-uber-assistant-frontend-deployment"
  namespace: ns-qry-aiml-stg-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cdcai-microsvc-uber-assistant-frontend-deployment
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 90
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: "vpa-cdcai-microsvc-uber-assistant-frontend-deployment"
  namespace: ns-qry-aiml-stg-api
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: cdcai-microsvc-uber-assistant-frontend-deployment
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: "cdcai-microsvc-uber-assistant-frontend-deployment"
      mode: "Off"
---
kind: ConfigMap
apiVersion: v1
metadata:
  name:  cm-cdcai-microsvc-uber-assistant-frontend-stg
  namespace: ns-qry-aiml-stg-api
data:
  # App / platform
  LOG_LEVEL: "INFO"
  GOOGLE_CLOUD_PROJECT: "esearch-sandbox-wsdc"

  # Application settings (UA_WS_* used by app/config.py)
  UA_WS_ENVIRONMENT: "production"
  UA_WS_LOG_LEVEL: "INFO"
  UA_WS_MAX_CONNECTIONS: "1000"

  # Latency simulation
  UA_WS_LATENCY_ENABLED: "true"
  UA_WS_LATENCY_MIN_MS: "50"
  UA_WS_LATENCY_MAX_MS: "300"
  UA_WS_LATENCY_SPIKE_PROBABILITY: "0.05"
  UA_WS_LATENCY_SPIKE_MIN_MS: "500"
  UA_WS_LATENCY_SPIKE_MAX_MS: "2000"

  # WebSocket subprotocols (JSON array)
  UA_WS_SUPPORTED_SUBPROTOCOLS: '["circuit.v1", "circuit.v2", "cdca2a"]'

  # Orchestrator async flow
  UA_WS_ASYNC_FLOW_ENABLED: "true"
  UA_WS_AGENT_BASE_URL: "http://cdcai-microsvc-uber-assistant-orchestration-agent-svc.ns-qry-aiml-stg-api.svc.cluster.local:8006"

  # WebSocket heartbeat
  UA_WS_HEARTBEAT_INTERVAL_SECONDS: "20"
  UA_WS_HEARTBEAT_TIMEOUT_SECONDS: "10"

  # Async response timeout
  UA_WS_ASYNC_RESPONSE_TIMEOUT_SECONDS: "60"

  # Redis session persistence (optional: set SESSION_PERSISTENCE_BACKEND to "redis" to enable)
  UA_WS_REDIS_HOST: "10.68.81.4"
  UA_WS_REDIS_PORT: "6397"
  UA_WS_REDIS_DB: "0"
  UA_WS_SESSION_PERSISTENCE_BACKEND: "memory"
---
